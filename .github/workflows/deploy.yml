name: Build + Deploy → Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @chonburi/web typecheck

      - name: Build
        run: pnpm --filter @chonburi/web build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Authenticate wrangler
        env:
          CF_REFRESH_TOKEN: ${{ secrets.CLOUDFLARE_REFRESH_TOKEN }}
        run: |
          RESPONSE=$(curl -s -X POST "https://dash.cloudflare.com/oauth2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=refresh_token&refresh_token=${CF_REFRESH_TOKEN}&client_id=54d11594-84e4-41aa-b438-e81b8fa78ee7")
          ACCESS=$(echo "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['access_token'])")
          NEW_REFRESH=$(echo "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['refresh_token'])")
          EXPIRES=$(date -u -d "+3600 seconds" +"%Y-%m-%dT%H:%M:%S.000Z")
          mkdir -p ~/.wrangler/config
          printf 'oauth_token = "%s"\nexpiration_time = "%s"\nrefresh_token = "%s"\n' \
            "$ACCESS" "$EXPIRES" "$NEW_REFRESH" > ~/.wrangler/config/default.toml

      - name: Deploy to Cloudflare Pages
        run: CI= npx wrangler@4.81.1 pages deploy apps/web/dist --project-name chonburi-control-tower --commit-dirty=true
